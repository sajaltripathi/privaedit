# Tell the Gradle process it has no screen
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djava.awt.headless=true

# Tell the Kotlin/KSP process it has no screen
kotlin.daemon.jvmargs=-Xmx2048m -Djava.awt.headless=true

android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
