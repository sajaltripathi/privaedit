name: Cloud Build APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # Notice we removed the 'cache: gradle' line so it doesn't load broken data

    - name: Make Gradle executable
      run: chmod +x gradlew

    - name: Force Clean and Build APK
      run: |
        ./gradlew --stop
        rm -rf .gradle
        ./gradlew clean assembleDebug --no-daemon --no-build-cache --no-configuration-cache

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PrivaEdit-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
