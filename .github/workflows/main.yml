name: Android CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Force kill any stuck daemons, ignore cache, and build headless
      - name: Build Debug APK
        run: |
          ./gradlew --stop
          ./gradlew assembleDebug --no-daemon --no-build-cache -Djava.awt.headless=true

      # Added this step to upload the APK so you can download it!
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrivaEdit-App
          path: app/build/outputs/apk/debug/app-debug.apk
